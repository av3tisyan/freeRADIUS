# -*- text -*-
##
## clients.conf -- RADIUS clients for HA cluster
## BlastRADIUS (CVE-2024-3596): require_message_authenticator = yes for all clients.
## Example topology: management/VIP 192.168.200.0/24; Wi‑Fi NAS 192.168.201.0/25;
## wired NAS 192.168.202.x; VPN NAS 192.168.203.x.
##
#######################################################################

#  Localhost (testing and inner-tunnel)
#  Security: Message-Authenticator required to mitigate BlastRADIUS.
client localhost {
	ipaddr = 127.0.0.1
	proto = *
	require_message_authenticator = yes
	secret = REPLACE_LOCALHOST_SECRET
	shortname = localhost
}

#  VPN gateway (OpenVPN, WireGuard, or other; NAS-Port-Type = Virtual is typical)
client vpn-gateway {
	ipaddr = 192.168.203.2
	proto = *
	require_message_authenticator = yes
	secret = REPLACE_VPN_GATEWAY_SECRET
	shortname = vpn-gateway
}

#  Optional test VPN client (documentation / lab; TEST-NET-1)
client test-vpn {
	ipaddr = 192.0.2.10
	proto = *
	require_message_authenticator = no
	secret = REPLACE_TEST_VPN_SECRET
	shortname = test-vpn
}

#  Wi‑Fi infrastructure (controller/AP subnet 192.168.201.0/25)
client wifi-nas {
	ipaddr = 192.168.201.0
	netmask = 25
	proto = *
	require_message_authenticator = yes
	secret = REPLACE_WIFI_NAS_SECRET
	shortname = wifi-nas
}

#  Wired 802.1X NAS
client wired-nas-01 {
	ipaddr = 192.168.202.20
	proto = *
	require_message_authenticator = yes
	secret = REPLACE_WIRED_NAS_SECRET
	shortname = wired-nas-01
}

#  VIP for HA (FRR VRRP/BGP) – clients point RADIUS server to this IP
client vip {
	ipaddr = 192.168.200.100
	proto = *
	require_message_authenticator = yes
	secret = REPLACE_VIP_SECRET
	shortname = vip
}
